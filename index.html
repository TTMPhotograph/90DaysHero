<!DOCTYPE html>
<html lang="ja" data-theme="dark" id="theme-html" class="overflow-x-hidden">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>90 Days Hero - Ultimate Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet" type="text/css" />
    <style>
        html,
        body {
            overflow-x: hidden;
            position: relative;
            width: 100%;
        }

        /* ドラッグ中の要素のスタイル */
        .dragging {
            opacity: 0.4;
            scale: 0.98;
            border-style: dashed !important;
            border-color: var(--fallback-s, oklch(var(--s)/1)) !important;
            /* DaisyUIのsecondaryカラー */
        }
    </style>
</head>

<body class="bg-base-300 min-h-screen flex flex-col text-base-content select-none font-sans overflow-x-hidden">

    <header class="navbar bg-base-100 border-b border-neutral/50 px-4 md:px-8 shadow-md sticky top-0 z-50">
        <div class="flex-1">
            <a class="text-xl font-black tracking-widest text-primary flex items-center gap-2">
                <span><svg class="w-6 h-6 text-primary" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 3.5z"></path>
                    </svg></span> 90 DAYS HERO
            </a>
        </div>
        <div class="flex items-center gap-2 sm:gap-4">

            <details class="dropdown dropdown-end">
                <summary class="btn btn-ghost btn-circle btn-sm list-none [&::-webkit-details-marker]:hidden" title="設定・データ管理">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="3"></circle>
                        <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                    </svg>
                </summary>
                <ul class="dropdown-content z-[100] menu p-2 shadow-2xl bg-base-200 border border-neutral/30 rounded-box w-44 gap-1 mt-2">
                    <li class="menu-title text-[10px] opacity-60 tracking-wider">データ管理</li>
                    <li>
                        <button id="btn-export-csv" class="btn btn-ghost btn-sm justify-start text-success font-bold text-xs gap-2">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 512 512">
                                <path fill="currentColor" fill-rule="evenodd" d="M234.667 85.333V128h-128v277.333h298.666v-128H448V448H64V85.333zm143.085-36.418L478.17 149.333L377.752 249.752l-30.17-30.17l48.903-48.916h-55.152c-34.084 0-61.944 26.644-63.891 60.24l-.109 3.76v106.667h-42.666V234.667c0-57.36 45.276-104.146 102.04-106.569l4.626-.098l55.151-.001l-48.902-48.914z" />
                            </svg>
                            CSV出力
                        </button>
                    </li>
                    <li>
                        <button id="btn-import-csv" class="btn btn-ghost btn-sm justify-start text-info font-bold text-xs gap-2" onclick="document.getElementById('csv-file-input').click()">
                            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 512 512">
                                <path fill="currentColor" fill-rule="evenodd" d="M448 85.333V448H64V170.666h42.667v234.667h298.667V128H320V85.333zm-277.333 0c57.36 0 104.145 45.276 106.568 102.04l.099 4.627l-.001 76.485l48.916-48.904l30.17 30.17L256 350.17L155.582 249.75l30.17-30.17l48.915 48.904V192c0-34.084-26.644-61.945-60.24-63.892l-3.76-.108h-128V85.333z" />
                            </svg>
                            CSV復元
                        </button>
                    </li>
                </ul>
            </details>
            <input type="file" id="csv-file-input" class="hidden" accept=".csv" />

            <div class="tooltip tooltip-bottom font-bold" data-tip="ライト・ダークモード切り替え">
                <label class="swap swap-rotate btn btn-ghost btn-circle btn-sm">
                    <input type="checkbox" id="theme-toggle" />
                    <svg class="swap-on w-5 h-5 text-warning" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                    <svg class="swap-off w-5 h-5 text-accent" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                </label>
            </div>
            <div class="hidden sm:block">
                <span class="badge badge-outline badge-warning font-bold text-xs tracking-wider px-3 py-2">STAY DISCIPLINED</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-4xl w-full mx-auto p-4 md:p-8 grid grid-cols-1 md:grid-cols-3 gap-6 overflow-x-hidden">
        <div class="md:col-span-2 space-y-6 overflow-x-hidden">
            <div class="card bg-base-100 shadow-xl border border-neutral/50 overflow-hidden">
                <div class="card-body items-center text-center p-4 sm:p-6">
                    <h1 class="card-title text-2xl sm:text-3xl font-black tracking-wider text-primary mb-1">90 DAYS HERO</h1>
                    <div id="rank-badge" class="badge badge-accent badge-lg font-bold gap-2 mb-4 shadow-md">読み込み中...</div>

                    <div class="grid grid-cols-4 gap-1.5 text-center auto-cols-max mb-4 w-full justify-center">
                        <div class="flex flex-col p-2 bg-neutral rounded-box text-neutral-content min-w-[60px] sm:min-w-[65px]">
                            <span id="days" class="font-mono text-2xl sm:text-3xl font-bold justify-center">00</span>
                            <span class="text-[10px] sm:text-xs font-semibold opacity-70">日</span>
                        </div>
                        <div class="flex flex-col p-2 bg-neutral rounded-box text-neutral-content min-w-[60px] sm:min-w-[65px]">
                            <span id="hours" class="font-mono text-2xl sm:text-3xl font-bold justify-center">00</span>
                            <span class="text-[10px] sm:text-xs font-semibold opacity-70">時</span>
                        </div>
                        <div class="flex flex-col p-2 bg-neutral rounded-box text-neutral-content min-w-[60px] sm:min-w-[65px]">
                            <span id="minutes" class="font-mono text-2xl sm:text-3xl font-bold justify-center">00</span>
                            <span class="text-[10px] sm:text-xs font-semibold opacity-70">分</span>
                        </div>
                        <div class="flex flex-col p-2 bg-neutral rounded-box text-neutral-content min-w-[60px] sm:min-w-[65px]">
                            <span id="seconds" class="font-mono text-2xl sm:text-3xl font-bold justify-center">00</span>
                            <span class="text-[10px] sm:text-xs font-semibold opacity-70">秒</span>
                        </div>
                    </div>

                    <div class="w-full px-1">
                        <div class="flex justify-between text-xs font-bold mb-1 opacity-80">
                            <span id="progress-percent">進捗: 0%</span>
                            <span>目標: 90日</span>
                        </div>
                        <progress id="progress-bar" class="progress progress-primary w-full h-3 shadow-inner" value="0" max="100"></progress>
                    </div>

                    <div class="bg-base-200 p-3 rounded-xl w-full text-xs font-medium border border-base-300 min-h-[3.5rem] flex items-center justify-center mt-4">
                        <p id="motivate-message" class="italic opacity-90"></p>
                    </div>
                </div>
            </div>

            <div class="card bg-base-100 shadow-xl border border-neutral/50 overflow-hidden">
                <div class="card-body p-4 sm:p-6">
                    <div class="flex flex-wrap justify-between items-center gap-2 mb-2">
                        <h2 class="card-title text-xl font-bold text-secondary">タスク管理</h2>
                        <div id="selected-date-badge" class="badge badge-info font-bold p-3 gap-1 shadow text-xs">選択日: 読み込み中...</div>
                    </div>

                    <div class="flex gap-2 mb-4">
                        <input type="text" id="task-input" placeholder="例: 筋トレをする、瞑想をする..." class="input input-bordered input-md flex-grow text-sm min-w-0" />
                        <button id="btn-add-task" class="btn btn-secondary btn-md font-bold shrink-0">追加</button>
                    </div>

                    <div id="task-list" class="space-y-2 max-h-60 overflow-y-auto pr-1"></div>
                    <p class="text-[10px] opacity-40 text-right mt-1">※タスクをドラッグして並び替えができます</p>
                </div>
            </div>
        </div>

        <div class="md:col-span-1 overflow-x-hidden">
            <div class="card bg-base-100 shadow-xl border border-neutral/50 h-full overflow-hidden">
                <div class="card-body p-4 sm:p-6 flex flex-col h-full">
                    <div class="flex justify-between items-center mb-4 gap-2">
                        <h2 id="view-title" class="card-title text-lg sm:text-xl font-bold text-accent shrink-0">履歴カレンダー</h2>
                        <div class="join shrink-0">
                            <button id="btn-view-cal" class="btn btn-xs join-item btn-active">月間</button>
                            <button id="btn-view-list" class="btn btn-xs join-item">リスト</button>
                        </div>
                    </div>

                    <div id="calendar-view" class="block w-full overflow-x-hidden">
                        <div class="text-center font-bold text-sm mb-2 opacity-80" id="calendar-month-year"></div>
                        <div class="grid grid-cols-7 gap-1 text-center text-[11px] font-bold mb-1 opacity-60">
                            <div class="text-error">日</div>
                            <div>月</div>
                            <div>火</div>
                            <div>水</div>
                            <div>木</div>
                            <div>金</div>
                            <div class="text-info">土</div>
                        </div>
                        <div id="calendar-grid" class="grid grid-cols-7 gap-1 text-center text-xs font-semibold"></div>
                        <p class="text-[10px] opacity-50 text-center mt-3">※今日または過去の日付をクリックすると、その日のタスクを編集できます。</p>
                    </div>

                    <div id="timeline-view" class="hidden w-full flex-grow overflow-y-auto max-h-[350px] pr-1">
                        <ul id="timeline-list" class="timeline timeline-vertical timeline-compact max-w-full"></ul>
                    </div>

                    <div class="mt-auto pt-6 text-center border-t border-neutral/30">
                        <button id="btn-reset" class="btn btn-outline btn-error btn-xs font-bold">カウンターリセット</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer footer-center p-6 bg-base-100 text-base-content border-t border-neutral/50 mt-auto">
        <aside class="max-w-full px-4">
            <p id="random-quote" class="italic font-bold text-center text-xs opacity-80 tracking-wide break-words">「読み込み中...」</p>
            <p class="text-[10px] opacity-50 mt-1">Copyright © 2026 - 90 DAYS HERO All rights reserved.</p>
        </aside>
    </footer>
    <script src="js/tools.js"></script>

</body>

</html>
